{% extends "dataverse/base.html" %}

{% block content %}

<section class="article-hero reveal-bottom{% if article.thumbnail %} article-hero--image{% endif %}"
         {% if article.thumbnail %}style="background-image: url('{{ article.thumbnail.url }}');"{% endif %}>
    {% if article.thumbnail %}<div class="article-hero-overlay"></div>{% endif %}
    <div class="container text-center article-hero-content">
        <h1 class="article-hero-title">{{ article.title }}</h1>
        <p class="article-hero-meta">
            <span>{{ article.category }}</span>
            <span class="article-hero-dot">·</span>
            <span>{{ article.published_date|date:"F j, Y" }}</span>
        </p>
    </div>
</section>

<section class="about-content py-5">
    <div class="container">
        <div class="about-text mt-2">{{ article.content|safe }}</div>
    </div>
    <div class="text-center mt-4">
        <a href="{% url 'index' %}" class="btn btn-about">Back</a>
    </div>
</section>

<script>
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('revealed');
                revealObserver.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal-bottom').forEach((el, i) => {
        el.style.transitionDelay = el.style.transitionDelay || (i * 80) + 'ms';
        revealObserver.observe(el);
    });
</script>

{% endblock %}
